name: InstantIntel - Daily Scrapy to Supabase

on:
  workflow_dispatch:
    inputs:
      spider_names:
        description: "Comma-separated spider names. Example: skyriverrv,moixrvhs (leave blank to run all)"
        required: false
        default: ""
      fail_fast:
        description: "If true, cancel remaining spider jobs after first failure"
        required: false
        default: false
        type: boolean
      max_parallel:
        description: "Max concurrent matrix jobs (1 = one spider at a time). Leave blank for default (256)."
        required: false
        default: ""
  # schedule:
  #   # Temporarily disabled. Re-enable by uncommenting cron lines below.
  # Avoid minute 0: GitHub queues many workflows on the hour, which often delays runs.
  # See: https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#schedule
  #   - cron: "25 2 * * *"
  #   - cron: "35 7 * * *"

# Use Node.js 24 for JS-based actions (checkout, setup-python) ahead of GitHub’s
# June 2026 default; avoids Node 20 deprecation warnings.
# See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  discover-spiders:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build spider matrix
        id: build-matrix
        env:
          INPUT_SPIDERS: ${{ github.event.inputs.spider_names || '' }}
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          import sys

          selected_raw = (os.getenv("INPUT_SPIDERS") or "").strip()
          selected = [x.strip() for x in selected_raw.split(",") if x.strip()]

          proc = subprocess.run(
              [sys.executable, "-m", "scrapy", "list"],
              capture_output=True,
              text=True,
              check=False,
          )
          if proc.returncode != 0:
              print(proc.stdout)
              print(proc.stderr, file=sys.stderr)
              raise SystemExit("Failed to list spiders.")

          available = [line.strip() for line in proc.stdout.splitlines() if line.strip()]
          if selected:
              missing = [s for s in selected if s not in available]
              if missing:
                  raise SystemExit(f"Unknown spider(s): {', '.join(missing)}")
              spiders = selected
          else:
              spiders = available

          if not spiders:
              raise SystemExit("No spiders found.")

          spiders = sorted(spiders, key=str.lower)
          matrix = {"spider": spiders}
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"matrix={json.dumps(matrix)}\n")
          print(f"Prepared matrix for {len(spiders)} spider(s).")
          PY

  run-spider:
    needs: discover-spiders
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    strategy:
      fail-fast: ${{ github.event.inputs.fail_fast == 'true' }}
      max-parallel: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.max_parallel != '' && fromJson(github.event.inputs.max_parallel) || 256 }}
      matrix: ${{ fromJson(needs.discover-spiders.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run spider
        run: |
          python -m scrapy crawl "${{ matrix.spider }}"
