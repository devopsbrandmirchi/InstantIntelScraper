name: Run Scrapy Spiders Parallel

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"   # Runs daily at 02:00 UTC

jobs:
  scrape:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        spider:
          - rohrmantoyota
          - skyriverrv
          - moixrvhs
          - moixrvmo
          - moixrvsc
          - claycooleyford
          - mcdavid
          - trailerhitchrv
          - campingworldareaFAR
          - rvcountry
          - funtownrvLR
          - campingworldareaLIT
          - campingworldareaSAR
          - wheelsrv
          - rockyridgerv
          - crabtreerv
          - WadesRvJO
          - campingworldareaLOW
          - RazorbackCampers
          - Livingston
          - rvcitybiz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scrapy Spider
        run: |
          echo "Running spider: ${{ matrix.spider }}"
          scrapy crawl ${{ matrix.spider }}
