name: InstantIntel - Daily Scrapy to Supabase

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"   # Daily at 02:00 UTC
    - cron: "0 7 * * *"   # Daily at 07:00 UTC

# Use Node.js 24 for JS-based actions (checkout, setup-python) ahead of GitHub’s
# June 2026 default; avoids Node 20 deprecation warnings.
# See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    strategy:
      matrix:
        spider:
          - rohrmantoyota
          - skyriverrv
          - moixrvhs
          - moixrvmo
          - moixrvsc
          - claycooleyford
          - mcdavid
          - trailerhitchrv
          - campingworldareaFAR
          - rvcountry
          - funtownrvLR
          - campingworldareaLIT
          - campingworldareaSAR
          - wheelsrv
          - rockyridgerv
          - crabtreerv
          - WadesRvJO
          - campingworldareaLOW
          - RazorbackCampers
          - Livingston
          - rvcitybiz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scrapy Spider
        run: |
          echo "Running spider: ${{ matrix.spider }}"
          scrapy crawl ${{ matrix.spider }}
